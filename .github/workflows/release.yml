name: Release

# STATUS: manual-only. The native node-pty rebuild hangs indefinitely inside
# @electron/rebuild on GitHub's Windows runners (silent stall in the
# "preparing" phase; three attempts, verbose logs swallowed). Official release
# path is local: scripts/release.ps1. Kept for future debugging via the
# Actions tab "Run workflow" button.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Pinned (not -latest): guaranteed VS2022 toolchain for the node-pty build.
    runs-on: windows-2022
    # The native rebuild once hung indefinitely on a runner; fail fast instead.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # node-gyp needs a Python with distutils (removed in 3.12+).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (builds node-pty)
        run: npm ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Verbose native-build logging: a previous run hung silently in
          # @electron/rebuild's "preparing" phase (suspected header download).
          npm_config_loglevel: verbose
          GYP_MSVS_VERSION: '2022'

      - name: Build
        run: npm run build

      - name: Package and publish release (draft)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # electron-builder uploads as a draft; make it public so auto-update sees it.
      - name: Publish draft release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release edit ${{ github.ref_name }} --repo ${{ github.repository }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
