name: Release

# Build and publish a GitHub release whenever a version tag is pushed:
#   git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    # Pinned (not -latest): guaranteed VS2022 toolchain for the node-pty build.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # node-gyp needs a Python with distutils (removed in 3.12+).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (builds node-pty)
        run: npm ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build
        run: npm run build

      - name: Package and publish release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
